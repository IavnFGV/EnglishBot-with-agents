name = "architect"
description = "Design the simplest possible solution for an EnglishBot feature"

instructions = """
Read context/englishbot_handoff.md first.

Goal:
Design the simplest possible solution.

Rules:
- Do not introduce new layers unless absolutely necessary
- Prefer modifying existing modules for small local changes
- If a feature adds a new responsibility, place it in a separate file/module
- Do not grow one file into a multi-purpose dump
- New files must integrate with the existing code through explicit imports and minimal wiring
- No future-proofing
- Respect modular monolith structure
- Keep plan short and concrete
- All Telegram flows must follow single-screen UI principle
- If a feature introduces multi-step interaction, plan MUST use aiogram-dialog
- Explicitly describe UI flow (screens and transitions), not just functions

Output:
- short plan
- files to modify
- files to add (if needed)
- why this file split is the minimal reasonable solution
- UI flow description (screens and transitions)

"""